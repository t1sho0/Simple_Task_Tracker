version: '3.8'

services:
  postgres_db: 
    image: postgres:15-alpine
    container_name: task_tracker_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web_api:
    image: task-tracker-api
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: task_tracker_app
    ports: 
      - "5103:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres_db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - postgres_db

volumes:
  pgdata: