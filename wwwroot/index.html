<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Tracker</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
        max-width: 560px;
        margin: 60px auto;
        padding: 0 20px;
        background-color: #ffffff;
        color: #37352f;
      }

      h1 {
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 24px;
        color: #37352f;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .form-group {
        display: flex;
        margin-bottom: 28px;
        position: relative;
      }

      input[type="text"] {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid rgba(15, 15, 15, 0.15);
        border-radius: 4px;
        font-size: 15px;
        outline: none;
        background: rgba(242, 241, 237, 0.4);
        transition:
          background 0.2s ease,
          border-color 0.2s ease;
      }

      input[type="text"]:focus {
        background: #ffffff;
        border-color: rgba(15, 15, 15, 0.3);
      }

      .btn-add {
        position: absolute;
        right: 4px;
        top: 4px;
        bottom: 4px;
        padding: 0 12px;
        border: none;
        background: #2383e2;
        color: white;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        border-radius: 3px;
        transition: background 0.2s ease;
      }

      .btn-add:hover {
        background: #1a6ab4;
      }

      ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      li {
        display: flex;
        align-items: center;
        padding: 6px 8px;
        margin-bottom: 4px;
        border-radius: 4px;
        transition: background-color 0.15s ease;
        group: hover;
      }

      li:hover {
        background-color: rgba(55, 53, 47, 0.04);
      }

      input[type="checkbox"] {
        width: 16px;
        height: 16px;
        margin-right: 12px;
        cursor: pointer;
        accent-color: #2383e2;
      }

      .task-container {
        flex: 1;
        display: flex;
        align-items: center;
      }

      .task-title {
        font-size: 15px;
        line-height: 1.5;
        color: #37352f;
        word-break: break-word;
      }

      .done {
        text-decoration: line-through;
        color: rgba(55, 53, 47, 0.4);
      }

      .edit-input {
        flex: 1;
        padding: 4px 8px;
        border: 1px solid #2383e2;
        border-radius: 3px;
        font-size: 15px;
        outline: none;
        background: #ffffff;
      }

      .actions {
        display: flex;
        gap: 4px;
        opacity: 0;
        transition: opacity 0.15s ease;
      }

      li:hover .actions {
        opacity: 1;
      }

      .btn-action {
        background: none;
        border: none;
        padding: 4px 6px;
        cursor: pointer;
        border-radius: 3px;
        font-size: 14px;
        transition: background-color 0.15s ease;
      }

      .btn-action:hover {
        background-color: rgba(55, 53, 47, 0.08);
      }
    </style>
  </head>
  <body>
    <h1><span>📝</span> Task Tracker</h1>

    <div class="form-group">
      <input type="text" id="taskInput" placeholder="Добавить задачу..." />
      <button class="btn-add" onclick="createTask()">Добавить</button>
    </div>

    <ul id="taskList"></ul>

    <script>
      const API_URL = "/api/Tasks";

      async function loadTasks() {
        try {
          const response = await fetch(API_URL);
          const tasks = await response.json();

          const taskList = document.getElementById("taskList");
          taskList.innerHTML = "";

          tasks.forEach((task) => {
            const li = document.createElement("li");

            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.checked = task.isDone;
            checkbox.onclick = () => toggleStatus(task.id);

            const taskContainer = document.createElement("div");
            taskContainer.className = "task-container";

            const span = document.createElement("span");
            span.className = `task-title ${task.isDone ? "done" : ""}`;
            span.innerText = task.title;
            taskContainer.appendChild(span);

            // Блок кнопок управления
            const actionsDiv = document.createElement("div");
            actionsDiv.className = "actions";

            // Кнопка Изменить
            const editBtn = document.createElement("button");
            editBtn.className = "btn-action";
            editBtn.innerText = "✏️";
            editBtn.title = "Изменить";
            editBtn.onclick = () =>
              enableEditMode(task.id, task.title, taskContainer, editBtn);

            // Кнопка Удалить
            const deleteBtn = document.createElement("button");
            deleteBtn.className = "btn-action";
            deleteBtn.innerText = "🗑️";
            deleteBtn.title = "Удалить";
            deleteBtn.onclick = () => deleteTask(task.id);

            actionsDiv.appendChild(editBtn);
            actionsDiv.appendChild(deleteBtn);

            li.appendChild(checkbox);
            li.appendChild(taskContainer);
            li.appendChild(actionsDiv);
            taskList.appendChild(li);
          });
        } catch (error) {
          console.error("Ошибка загрузки:", error);
        }
      }

      function enableEditMode(id, currentTitle, container, editBtn) {
        container.innerHTML = "";
        editBtn.style.display = "none";

        const input = document.createElement("input");
        input.type = "text";
        input.className = "edit-input";
        input.value = currentTitle;
        container.appendChild(input);
        input.focus();

        const saveEdit = async () => {
          const newTitle = input.value.trim();
          if (newTitle && newTitle !== currentTitle) {
            try {
              await fetch(`${API_URL}/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id: id, title: newTitle }),
              });
            } catch (error) {
              console.error("Ошибка изменения:", error);
            }
          }
          loadTasks();
        };

        input.onkeydown = (e) => {
          if (e.key === "Enter") saveEdit();
        };
        input.onblur = saveEdit;
      }

      async function createTask() {
        const input = document.getElementById("taskInput");
        if (!input.value.trim()) return;

        try {
          await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title: input.value }),
          });
          input.value = "";
          loadTasks();
        } catch (error) {
          console.error("Ошибка создания:", error);
        }
      }

      async function toggleStatus(id) {
        try {
          await fetch(`${API_URL}/${id}`, {
            method: "PATCH",
          });
          loadTasks();
        } catch (error) {
          console.error("Ошибка обновления статуса:", error);
        }
      }

      async function deleteTask(id) {
        try {
          await fetch(`${API_URL}/permanently/${id}`, {
            method: "DELETE",
          });
          loadTasks();
        } catch (error) {
          console.error("Ошибка удаления:", error);
        }
      }

      document.getElementById("taskInput").onkeydown = (e) => {
        if (e.key === "Enter") createTask();
      };

      loadTasks();
    </script>
  </body>
</html>
